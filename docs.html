<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Phantom Documentation</title>
    <link rel="icon" href="./Images/Red Phantom.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0b0d12;
        color: #e5e7eb;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
        flex-direction: row;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      ::-webkit-scrollbar {
        width: 7px;
      }
      ::-webkit-scrollbar-thumb {
        background: #ff003c;
        border-radius: 10px;
      }

      header {
        position: fixed;
        top: 0;
        left: 250px;
        right: 0;
        padding: 20px 35px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1f2937;
        z-index: 50;
        transform: translateY(-50px);
        animation: slideDown 0.8s ease forwards 0.3s;
      }
      @keyframes slideDown {
        to {
          transform: translateY(0);
        }
      }

      header h1 {
        margin: 0;
        color: #ff2d39;
        font-size: 26px;
        text-shadow: 0 0 10px #ff2d39;
        font-weight: 900;
      }
      header a {
        margin-left: 20px;
        text-decoration: none;
        color: #9ca3af;
        transition: 0.2s;
        font-size: 15px;
      }
      header a:hover {
        color: #fff;
      }

      .sidebar {
        width: 250px;
        background: #11141a;
        border-right: 1px solid #1f2937;
        padding-top: 90px;
        overflow-y: auto;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-80px);
        opacity: 0;
        animation: slideSidebar 0.8s ease forwards 0.5s;
      }
      @keyframes slideSidebar {
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .sidebar h2 {
        text-align: center;
        font-size: 20px;
        color: #ff4757;
        margin-bottom: 15px;
      }

      .tool-item {
        padding: 12px 20px;
        cursor: pointer;
        font-size: 15px;
        border-bottom: 1px solid #1f2937;
        transition: 0.25s;
      }
      .tool-item:hover {
        background: #1a1d25;
        color: #ff4757;
      }
      .tool-item.active {
        background: #ff2d39;
        color: #fff;
      }

      .content {
        margin-left: 250px;
        padding: 120px 40px 40px;
        flex: 1;
        overflow-y: auto;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.5s ease;
      }
      .content.show {
        opacity: 1;
        transform: translateY(0);
      }

      .tool-title {
        font-size: 40px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #fff;
        text-shadow: 0 0 15px #ff2d3d55;
      }

      .description {
        font-size: 17px;
        opacity: 0.85;
        max-width: 900px;
        line-height: 1.8;
        margin-bottom: 25px;
      }

      .section-title {
        font-size: 22px;
        margin-top: 25px;
        margin-bottom: 8px;
        color: #ff2d39;
        font-weight: 700;
      }

      .tag {
        display: inline-block;
        background: #1a1d25;
        padding: 6px 14px;
        border-radius: 10px;
        margin-right: 10px;
        margin-top: 10px;
        border: 1px solid #ff2d3944;
        color: #ff2d39;
        font-size: 13px;
        transition: 0.3s;
      }
      .tag:hover {
        background: #ff2d39;
        color: #fff;
      }

      .command-box,
      .example-box {
        background: #11141a;
        border: 1px solid #1f2937;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        transition: 0.25s;
      }
      .example-box:hover,
      .command-box:hover {
        border-color: #ff2d39;
        box-shadow: 0 0 15px #ff2d3d44;
      }

      .btns {
        margin-top: 25px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .action-btn {
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        background: #ff2d39;
        color: #fff;
        font-weight: 600;
        transition: 0.25s;
        font-size: 15px;
      }
      .action-btn:hover {
        background: #ff4757;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Tools</h2>
      <div id="tools-list"></div>
    </div>

    <header>
      <h1>Red Phantom Docs</h1>
      <nav>
        <a href="landing.html">Home</a>
        <a href="index.html">Chat</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <div class="content">
      <h1 class="tool-title">Select a Tool</h1>
      <p class="description">
        Choose a tool from the left sidebar to view its full documentation.
      </p>
    </div>

    <script>
      const tools = [
        {
          slug: "nmap",
          name: "Nmap",
          description:
            "Nmap (Network Mapper) is a sophisticated and highly versatile network scanning and reconnaissance tool used by cybersecurity professionals to gain a comprehensive understanding of network architecture. It can detect devices, open ports, running services, firewall configurations, operating system fingerprints, and potential vulnerabilities with exceptional precision. Nmap’s advanced scanning techniques—including TCP SYN scan, UDP scan, service version detection, timing optimization, and stealth scanning—allow analysts to map networks while minimizing detection by security systems. Its powerful scripting engine (NSE) enables automation of complex tasks such as vulnerability discovery, malware detection, brute-force attacks, SSL inspection, and advanced network intelligence collection, making it indispensable for security audits, penetration testing, and compliance verification.",
          tags: ["network", "scan", "security", "audit"],
          examples: [
            "Performing a full network audit on an enterprise infrastructure to detect exposed services and misconfigurations across hundreds of hosts.",
            "Scanning cloud-based systems to enumerate open ports, detect service versions, and identify potential vulnerabilities without disrupting operations.",
          ],
          protection:
            "To protect against Nmap scanning, deploy properly configured firewalls, enable intrusion detection systems (IDS/IPS), close unnecessary ports, and continuously monitor for scanning attempts or anomalies.",
          remediation:
            "If unauthorized scanning is detected, review firewall and IDS logs, block suspicious IP addresses, audit exposed services, and update network security policies to minimize exposure.",
        },
        {
          slug: "wireshark",
          name: "Wireshark",
          description:
            "Wireshark is a world-class packet analysis platform that allows security professionals to capture, inspect, and decode network traffic at an exceptional level of granularity. It provides full visibility into packet headers, payloads, encryption layers, timing, TCP handshakes, and anomalies. Wireshark supports hundreds of protocols, enabling deep traffic inspection for security audits, network troubleshooting, performance monitoring, and protocol research. Analysts rely on it to detect suspicious or malicious packets, investigate data leaks, analyze latency or connectivity issues, and reverse-engineer network communication patterns. Its precise filtering capabilities ensure that targeted traffic analysis is efficient and comprehensive.",
          tags: ["network", "analysis", "protocols", "monitoring"],
          examples: [
            "Analyzing encrypted HTTPS traffic to identify SSL handshake failures or certificate misconfigurations.",
            "Monitoring ARP broadcast patterns to detect abnormal activity indicative of spoofing or MITM attempts.",
          ],
          protection:
            "Mitigate the risks of packet sniffing by using encrypted protocols (HTTPS, TLS), deploying VPNs on untrusted networks, and applying strong access controls and network segmentation.",
          remediation:
            "If unauthorized network monitoring is discovered, disconnect from the affected network, rotate credentials, enable full traffic encryption, and review network access policies.",
        },
        {
          slug: "metasploit",
          name: "Metasploit",
          description:
            "Metasploit is an industry-standard penetration testing and exploit development framework, enabling security teams to simulate real-world cyberattacks, assess vulnerabilities, and evaluate system defenses. The platform provides thousands of pre-built exploits, payloads, auxiliary modules, post-exploitation tools, and automation engines. Professionals leverage Metasploit to conduct privilege escalation tests, network exploitation, credential attacks, misconfiguration analysis, and vulnerability verification. Its integration with tools like Nmap, Nessus, and BurpSuite supports full-spectrum offensive security workflows. Metasploit also allows creation of custom payloads and exploits using Ruby or Python, empowering advanced research and Red Team operations.",
          tags: ["pentest", "framework", "exploitation", "training"],
          examples: [
            "Simulating controlled attacks on corporate systems to evaluate resilience against privilege escalation and network exploitation.",
            "Analyzing post-exploitation data to assess the effectiveness of internal monitoring and incident response processes.",
          ],
          protection:
            "Mitigation includes keeping systems and applications updated, enforcing strict user permissions, enabling endpoint protection, deploying firewalls, and monitoring logs for abnormal behavior.",
          remediation:
            "If a system is compromised via exploitation, immediately isolate affected devices, review logs to determine the attack vector, rotate credentials, and restore systems from trusted backups.",
        },
        {
          slug: "encrypt",
          name: "Encryption Tool",
          description:
            "This Encryption Tool leverages state-of-the-art cryptographic algorithms to secure sensitive files and folders, transforming readable data into encrypted, unreadable blocks that can only be decrypted with the correct key. Widely adopted by organizations, developers, journalists, and individuals, it ensures confidentiality of documents, source code, backups, and financial records. The tool supports rapid encryption for large data sets while maintaining file integrity and includes safeguards to prevent data corruption during the process.",
          tags: ["encryption", "security", "files", "privacy"],
          examples: [
            "Encrypting confidential source code repositories before transferring them between development environments.",
            "Securing financial documents and backup archives using AES-256 encryption workflows.",
          ],
          protection:
            "Protect your encrypted data by storing encryption keys securely, using strong passwords, and avoiding sharing sensitive files on untrusted channels.",
          remediation:
            "If access is lost, recover files using trusted backups and safely stored keys. Avoid using third-party decryption tools from unverified sources.",
        },
        {
          slug: "decrypt",
          name: "Decryption Tool",
          description:
            "The Decryption Tool reverses encryption to restore files to their original readable format using the correct key or password. It guarantees that only authorized users regain access to sensitive data. Decryption is crucial for restoring backups, accessing encrypted archives, and unlocking protected folders. This tool is optimized for both small and large data sets, ensuring integrity during the decryption process.",
          tags: ["decryption", "files", "security", "recovery"],
          examples: [
            "Restoring encrypted client archives for forensic analysis or legal compliance.",
            "Decrypting backup containers retrieved from secure off-site storage for operational use.",
          ],
          protection:
            "Ensure only authorized personnel have access to decryption keys and avoid sharing sensitive encrypted files with untrusted parties.",
          remediation:
            "If unauthorized access occurs, audit key usage, rotate keys, and reassess file storage security policies.",
        },
        {
          slug: "keylogger",
          name: "Keylogger (Concept)",
          description:
            "A Keylogger is a system that monitors and records keystrokes to understand how sensitive data can be captured. In cybersecurity education, keyloggers demonstrate how attackers obtain passwords, messages, and other private information. Learning keylogger behavior equips analysts to detect malicious activity, implement endpoint protections, enhance antivirus detection, and educate users on safe practices. It covers kernel-level vs. user-level logging, modern prevention mechanisms, and forensic identification of keystroke capture.",
          tags: ["concept", "security", "endpoint", "awareness"],
          examples: [
            "Training IT personnel to detect suspicious input-hooking behaviors and malware activity.",
            "Demonstrating how endpoint protection software prevents unauthorized keystroke recording.",
          ],
          protection:
            "Prevent keylogger attacks by using reliable antivirus solutions, performing regular malware scans, avoiding suspicious downloads, and employing multi-factor authentication for sensitive accounts.",
          remediation:
            "If a keylogger is discovered, isolate the device, remove malware, change all passwords, and review endpoint security configurations.",
        },
        {
          slug: "network-scan",
          name: "Network Scanner",
          description:
            "A Network Scanner identifies active devices and collects detailed information such as IP addresses, MAC addresses, open ports, hostnames, response times, and running services. It is essential for mapping network topology, monitoring devices, detecting intruders, and troubleshooting connectivity issues. It supports ARP discovery, ICMP sweeping, TCP probing, and passive monitoring to provide administrators with a comprehensive view of network behavior across both small and enterprise environments.",
          tags: ["network", "scanner", "devices", "monitoring"],
          examples: [
            "Mapping all IoT devices in a smart office environment for asset management and security audits.",
            "Detecting unauthorized devices on a corporate Wi-Fi network and enforcing access control policies.",
          ],
          protection:
            "Deploy firewalls, VLAN segmentation, and network access control measures. Continuously monitor for unusual devices or traffic patterns.",
          remediation:
            "If unauthorized scanning is detected, analyze logs, isolate suspicious devices, and update access policies to prevent recurrence.",
        },
        {
          slug: "arp-spoofing",
          name: "ARP Spoofing (Concept)",
          description:
            "ARP Spoofing is an attack technique where forged ARP packets are injected into a local network, causing devices to associate incorrect MAC-to-IP mappings. This allows attackers to intercept, modify, or redirect traffic in a Man-in-the-Middle (MITM) scenario. Understanding ARP spoofing is crucial for defensive security, as it highlights the importance of monitoring ARP tables and securing local networks. The concept includes ARP table poisoning, packet interception, attacker techniques, detection mechanisms, and mitigation strategies such as static ARP entries, Dynamic ARP Inspection (DAI), VLAN segmentation, and intrusion detection systems.",
          tags: ["network", "concept", "security", "mitm"],
          examples: [
            "Simulating ARP poisoning attacks in a controlled lab environment to assess security measures.",
            "Studying potential MITM risks and evaluating mitigation strategies in corporate networks.",
          ],
          protection:
            "Mitigate ARP spoofing by implementing static ARP entries, enabling DAI, segmenting networks with VLANs, and monitoring for abnormal ARP traffic.",
          remediation:
            "If ARP spoofing occurs, reset ARP tables, isolate affected devices, and perform network forensics to identify the attack source.",
        },
        {
          slug: "track-website",
          name: "Website Tracker",
          description:
            "Website Tracker collects publicly available intelligence about domains and websites, including DNS records, IP addresses, geolocation, SSL certificates, hosting providers, protocols, and HTTP response headers. It is widely used for security audits, compliance verification, threat analysis, and investigative research. By understanding how web assets expose metadata, analysts can evaluate vulnerabilities, misconfigurations, and potential subdomain or certificate risks safely and responsibly.",
          tags: ["web", "tracking", "information", "analysis"],
          examples: [
            "Analyzing the SSL certificate chain of a website to ensure compliance with security policies.",
            "Inspecting DNS structures to detect potential subdomain takeover vulnerabilities.",
          ],
          protection:
            "Protect websites by enforcing HTTPS, applying DNSSEC, limiting publicly exposed information, and monitoring security logs regularly.",
          remediation:
            "If unauthorized tracking is observed, review website configuration, strengthen DNS and SSL setups, and update security monitoring procedures.",
        },
        {
          slug: "track-phone",
          name: "Phone Number Tracker",
          description:
            "Phone Number Tracker provides publicly available information about phone numbers, including carrier, line type, region, timezone, and validity. This tool is used for verification, fraud prevention, telecom analysis, and awareness purposes. It demonstrates how number parsing and carrier identification work, how numbering plans differ by country, and methods to detect disposable or virtual numbers. Designed for ethical and responsible usage, it supports professionals in identifying suspicious communication.",
          tags: ["phone", "tracking", "information", "security"],
          examples: [
            "Validating international phone numbers for business communications to ensure correct routing.",
            "Identifying the carrier or location behind suspicious or unknown phone calls to prevent scams.",
          ],
          protection:
            "Limit exposure by using temporary numbers for online registrations, avoiding sharing personal numbers publicly, and enabling privacy features with carriers.",
          remediation:
            "If tracked without consent, contact the carrier to change the number or enable additional privacy protections, and review privacy settings on online accounts.",
        },
      ];

      const toolsList = document.getElementById("tools-list");
      const content = document.querySelector(".content");

      tools.forEach((tool) => {
        const item = document.createElement("div");
        item.className = "tool-item";
        item.textContent = tool.name;
        item.onclick = () => loadTool(tool.slug);
        toolsList.appendChild(item);
      });

      function loadTool(slug) {
        document
          .querySelectorAll(".tool-item")
          .forEach((i) => i.classList.remove("active"));
        const selected = [...document.querySelectorAll(".tool-item")].find(
          (i) => i.textContent === tools.find((t) => t.slug === slug).name
        );
        selected.classList.add("active");
        const tool = tools.find((t) => t.slug === slug);

        content.classList.remove("show");

      setTimeout(() => {
        content.innerHTML = `
          <h1 class="tool-title">${tool.name}</h1>
          <p class="description">${tool.description}</p>

          <h3 class="section-title">Tags</h3>
          ${tool.tags.map((t) => `<span class="tag">${t}</span>`).join("")}

          <h3 class="section-title">Examples</h3>
          ${tool.examples
            .map((e) => `<div class="example-box">${e}</div>`)
            .join("")}

          <h3 class="section-title">Protection</h3>
          <div class="example-box">${tool.protection}</div>

          <h3 class="section-title">Remediation</h3>
          <div class="example-box">${tool.remediation}</div>

          <div class="btns">
            <a href="../../Red-Phantom-Bot/frontend/index.html" class="action-btn" id="more-info-btn">More Info</a>
            <a href="../../tools/frontend/index.html" class="action-btn" id="try-tool-btn">Try Tool</a>
          </div>
        `;

        content.classList.add("show");
        document.getElementById("more-info-btn").href =
          "../../Red-Phantom-Bot/frontend/index.html";
        document.getElementById("try-tool-btn").href =
          "../../tools/frontend/index.html";
      }, 200);
      }
    </script>
  </body>
</html>
