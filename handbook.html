<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Phantom Handbook</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(145deg, #0b0d12, #0e1118);
        color: #e5e7eb;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* ===== Sidebar ===== */
      .sidebar {
        width: 300px;
        background: #0f1218;
        border-right: 1px solid #1f2937;
        padding: 25px 18px;
        overflow-y: auto;
      }

      .sidebar h2 {
        color: #ff2d39;
        font-size: 24px;
        margin-bottom: 25px;
        text-align: center;
        letter-spacing: 1px;
      }

      .chapter {
        margin-bottom: 18px;
      }

      .chapter-title {
        background: linear-gradient(145deg, #1a1d25, #141720);
        padding: 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        border: 1px solid #1f2937;
      }

      .chapter-title:hover {
        background: #ff2d39;
        color: #fff;
        box-shadow: 0 0 12px #ff2d3955;
      }

      .topics {
        margin-top: 10px;
        display: none;
        padding-left: 12px;
      }

      .topic {
        padding: 9px 12px;
        margin-bottom: 6px;
        font-size: 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.25s;
        color: #9ca3af;
      }

      .topic.active {
        background: #ff2d39;
        color: #fff;
        box-shadow: 0 0 10px #ff2d3966;
      }

      /* ===== Content ===== */
      .content {
        flex: 1;
        padding: 45px;
        overflow-y: auto;
      }

      .content-card {
        background: #0f131c;
        border-radius: 18px;
        padding: 45px;
        border: 1px solid #1f2937;
        max-width: 1000px;
        margin: auto;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .toolbar span {
        color: #ff2d39;
        font-weight: 600;
      }

      .download-btn {
        background: linear-gradient(145deg, #ff2d39, #ff4757);
        border: none;
        padding: 10px 22px;
        border-radius: 10px;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 5px;
      }

      h3 {
        color: #ff2d39;
        margin-bottom: 25px;
      }

      .divider {
        height: 1px;
        background: linear-gradient(to right, #ff2d39, transparent);
        margin: 30px 0;
      }

      .topic-content {
        font-size: 16px;
        line-height: 2;
        color: #d1d5db;
        white-space: pre-line;
        text-align: justify;
      }

      .nav-buttons {
        margin-top: 40px;
        display: flex;
        justify-content: space-between;
      }

      .nav-buttons button {
        padding: 12px 26px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: #ff2d39;
        color: #fff;
        font-weight: 600;
      }

      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .sidebar,
        .nav-buttons,
        .toolbar button {
          display: none;
        }
        .content-card {
          border: none;
          box-shadow: none;
        }
      }
    </style>
  </head>

  <body>
    <aside class="sidebar">
      <h2>HANDBOOK</h2>

      <div class="chapter">
        <div class="chapter-title" onclick="toggleChapter(this)">
          Chapter 1 – Introduction
        </div>
        <div class="topics">
          <div class="topic" onclick="loadTopic(0)">Abstract</div>
          <div class="topic" onclick="loadTopic(1)">Introduction</div>
          <div class="topic" onclick="loadTopic(2)">Overview</div>
          <div class="topic" onclick="loadTopic(3)">Why this project?</div>
          <div class="topic" onclick="loadTopic(4)">Problem Statement</div>
          <div class="topic" onclick="loadTopic(5)">Project Contributions</div>
          <div class="topic" onclick="loadTopic(6)">
            Objectives, Scope & Significance
          </div>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-card">
        <div class="toolbar">
          <span id="topic-chapter">Handbook</span>
          <button class="download-btn" onclick="downloadPDF()">
            ⬇ Download
          </button>
        </div>

        <h1 id="topic-title">Welcome</h1>
        <div class="divider"></div>

        <div class="topic-content" id="topic-content">
          Select a topic from the left panel.
        </div>

        <div class="nav-buttons">
          <button onclick="prevTopic()">⬅ Back</button>
          <button onclick="nextTopic()">Next ➡</button>
        </div>
      </div>
    </main>

    <script>
      let currentTopic = -1;

      const topicsData = [
        {
          chapter: "Chapter 1 – Abstract",
          title: "Abstract",
          content: `This project presents a fully integrated Cyber Security Intelligence and Anomaly Detection Platform designed to enhance digital safety for individuals, developers, and organizations. The platform provides a comprehensive suite of tools that detect, analyze, and prevent cybersecurity threats through safe, ethical, and non-destructive techniques. It combines advanced security scanning, cryptographic utilities, educational guidance, and automated threat-analysis workflows into a single unified system, accessible through a modern web interface.
At its core, the platform offers an Anomaly Detection Engine capable of analyzing website URLs, evaluating SSL certificates, inspecting HTTP security headers, identifying outdated components, detecting phishing indicators, and highlighting potential vulnerabilities. The system generates a detailed remediation report with practical security recommendations and best-practice solutions. This ensures users can understand their risks and apply correct defensive strategies without the need for deep security expertise.
The platform also integrates an intelligent Cyber Security Chatbot specialized in security concepts, secure-coding practices, cryptography, penetration-testing methodologies (in a safe and ethical context), threat mitigation, and incident response. The chatbot helps users learn, ask questions, and get structured defensive guidance, effectively serving as a 24/7 cybersecurity assistant.
In addition, the project includes a collection of Security Tools designed strictly for defensive and educational use. These tools include robust encryption and decryption systems for files and directories using RSA and AES standards, network scanning utilities that examine open ports and service fingerprints with user consent, and a URL Intelligence Module that analyzes domain metadata such as SSL expiration, hosting information, and domain age. All tools are sandboxed and rate-limited to ensure safe and legal operation.
The platform emphasizes user safety, privacy, and ethics. All scans are performed only with explicit user authorization, and the system avoids any offensive or harmful functionalities. Instead, it focuses on defensive awareness, threat detection, secure-coding education, encryption, and security posture improvement. This makes the solution suitable for students, cybersecurity enthusiasts, small businesses, and organizations seeking a cost-effective way to strengthen their digital defenses.
With its modular architecture, AI-driven components, real-time analysis pipelines, and strong ethical foundation, this cybersecurity platform bridges the gap between complex security concepts and everyday users. It transforms traditionally difficult, technical processes into automated, user-friendly, and actionable insights. Ultimately, the platform aims to democratize cybersecurity — making protection, education, and awareness available to everyone, regardless of technical background or organizational size.
In addition to its analytical and educational capabilities, the platform excels at aggregating and interpreting security data over time, enabling users to monitor and understand the evolution of their security posture. By consolidating scan results, risk levels, common threat patterns, and changes in server configurations, the system generates dynamic security indicators that offer a clear overview of overall protection status. Leveraging artificial intelligence, the platform identifies suspicious behavioral patterns, predicts potential
risks, and provides proactive recommendations to mitigate threats before they materialize. This transforms the system from a simple scanning tool into a comprehensive, continuous security improvement framework.
Moreover, the project embraces a highly scalable Modular Architecture that supports seamless expansion and future enhancements. This allows the integration of additional tools such as malware analysis modules, network monitoring systems, automated vulnerability assessment engines, or identity and access management components. Both the frontend and backend are designed to support smooth API-based integrations, enabling organizations to incorporate the platform into their existing security ecosystems with minimal friction. This ensures that the solution is not just a temporary utility, but a sustainable, future-ready cybersecurity ecosystem capable of evolving alongside emerging threats and technological advancements.
Another key advantage of the platform is its focus on human-centered cybersecurity, recognizing that many security incidents originate from human error rather than technical flaws. To address this, the system incorporates interactive learning modules, real-world security scenarios, and guided best-practice workflows that educate users on safe online behavior and responsible system management. By combining practical defense tools with continuous security awareness training, the platform helps reduce the likelihood of social engineering attacks, misconfigurations, and unsafe digital habits—ultimately strengthening both individual and organizational resilience.
Furthermore, the platform is built with a strong commitment to transparency, reliability, and ethical compliance, ensuring that every operation is fully traceable and adheres to cybersecurity regulations and responsible-use guidelines. Comprehensive logging, user-permission controls, and secure handling of sensitive data are integrated throughout the system’s architecture. This not only builds trust with end users but also makes the platform suitable for academic institutions, cybersecurity training programs, and organizations requiring a certified and regulation-aligned security environment. By merging ethical AI, robust data governance, and advanced technical functionality, the project delivers a trustworthy ecosystem that supports safe innovation in the cybersecurity landscape.
Finally , this platform represents a forward-thinking approach to cybersecurity—one that bridges the gap between technical complexity and everyday usability. By unifying anomaly detection, cryptographic tools, learning resources, and AI-driven guidance under a secure and ethical framework, the system empowers users to take control of their digital safety with confidence. Its adaptability, modular structure, and commitment to responsible cybersecurity practices position it as a scalable solution capable of supporting continuous growth and future innovation. Ultimately, the platform aims to make advanced cybersecurity accessible to everyone, promoting a safer digital environment for individuals, developers, and organizations worldwide.
Keywords: ( Cyber Security - Anomaly Detection - URL Vulnerability Assessment - Threat Intelligence - SSL Certificate Analysis - Phishing Detection - Security Awareness - Security Awareness - Encryption & Decryption (RSA, AES) - Network Scanning (Safe & Consent-Based) - Secure Coding - Cyber Security Chatbot - Incident Response Guidance - Safe Penetration Testing Concepts - Web Security Best Practices - Cyber Defense Platform - AI-Driven Security Tools`,
        },
        {
          chapter: "Chapter 1 – Introduction",
          title: "Introduction",
          content: `ضع هنا نص المقدمة`,
        },
        {
          chapter: "Chapter 1 – Overview",
          title: "Overview",
          content: `ضع هنا الـ Overview`,
        },
        {
          chapter: "Chapter 1 – Why this project?",
          title: "Why this project?",
          content: `ضع هنا السبب`,
        },
        {
          chapter: "Chapter 1 – Problem Statement",
          title: "Problem Statement",
          content: `ضع هنا المشكلة`,
        },
        {
          chapter: "Chapter 1 – Project Contributions",
          title: "Project Contributions",
          content: `ضع هنا المساهمات`,
        },
        {
          chapter: "Chapter 1 – Objectives, Scope & Significance",
          title: "Objectives, Scope & Significance",
          content: `ضع هنا الأهداف والنطاق`,
        },
      ];

      function toggleChapter(el) {
        const topics = el.nextElementSibling;
        topics.style.display =
          topics.style.display === "block" ? "none" : "block";
      }

      function loadTopic(index) {
        currentTopic = index;
        document.getElementById("topic-title").innerText =
          topicsData[index].title;
        document.getElementById("topic-chapter").innerText =
          topicsData[index].chapter;
        document.getElementById("topic-content").innerText =
          topicsData[index].content;

        document
          .querySelectorAll(".topic")
          .forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".topic")[index].classList.add("active");
      }

      function nextTopic() {
        if (currentTopic < topicsData.length - 1) loadTopic(currentTopic + 1);
      }

      function prevTopic() {
        if (currentTopic > 0) loadTopic(currentTopic - 1);
      }

      function downloadPDF() {
        window.print();
      }
    </script>
  </body>
</html>
